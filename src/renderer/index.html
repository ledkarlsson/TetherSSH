<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TetherSSH</title>
    <link rel="stylesheet" href="../../node_modules/@xterm/xterm/css/xterm.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="connection-panel">
        <button
          id="toggle-connection-panel"
          class="connection-panel-toggle"
          type="button"
          aria-expanded="true"
          title="Toggle connection panel"
        >
          TetherSSH
        </button>

        <header>
          <h1>TetherSSH</h1>
          <p>Terminal and remote files, tied to one SSH session.</p>
        </header>

        <form id="connection-form" class="connection-form">
          <div class="profile-toolbar">
            <label>
              Profile
              <select id="profile-select">
                <option value="">New connection</option>
              </select>
            </label>
            <div class="profile-buttons">
              <button id="new-profile" type="button">New</button>
              <button id="save-profile" type="button">Save</button>
              <button id="delete-profile" type="button" disabled>Delete</button>
            </div>
          </div>

          <label>
            Profile name
            <input id="profile-name" name="profileName" autocomplete="off" placeholder="Production server" />
          </label>

          <label class="inline-checkbox">
            <input id="favorite-profile" name="favorite" type="checkbox" />
            Favorite
          </label>

          <label>
            Connection
            <input id="target" name="target" autocomplete="off" required placeholder="user@hostname:22" />
          </label>

          <div id="tcp-status" class="tcp-status tcp-status-idle">Enter user@hostname:port</div>

          <label>
            Authentication
            <select id="auth-method" name="authMethod">
              <option value="auto">Auto</option>
              <option value="password">Password</option>
              <option value="key">Private key</option>
              <option value="agent">SSH agent</option>
            </select>
          </label>

          <div class="auth-field" data-auth-modes="auto,password">
          <label>
            Password <span class="label-hint">optional</span>
            <input id="password" name="password" type="password" autocomplete="current-password" />
          </label>
            <label class="inline-checkbox">
              <input id="remember-password" name="rememberPassword" type="checkbox" />
              Remember password securely
            </label>
          </div>

          <div class="auth-field" data-auth-modes="auto,key">
            <label>
              Private key <span class="label-hint">optional in Auto</span>
              <span class="path-input-row">
                <input id="private-key-path" name="privateKeyPath" autocomplete="off" placeholder="Auto-detect from ~/.ssh" />
                <button id="browse-private-key" type="button" title="Select SSH private key">Browse</button>
              </span>
            </label>
            <label>
              Key passphrase <span class="label-hint">optional</span>
              <input id="passphrase" name="passphrase" type="password" autocomplete="off" />
            </label>
            <label class="inline-checkbox">
              <input id="remember-passphrase" name="rememberPassphrase" type="checkbox" />
              Remember passphrase securely
            </label>
          </div>

          <div class="auth-field" data-auth-modes="auto,agent">
            <label>
              Agent socket <span class="label-hint">optional</span>
              <input id="agent-socket" name="agentSocket" autocomplete="off" placeholder="SSH_AUTH_SOCK or Pageant" />
            </label>
          </div>

          <button id="connect-button" type="submit">Connect</button>
          <button id="disconnect-button" type="button" disabled>Disconnect</button>
        </form>

        <div id="status" class="status">Disconnected</div>
        <section class="session-log-panel">
          <div class="session-log-title">
            <span>Session log</span>
            <button id="toggle-session-log" type="button" aria-expanded="true">Hide</button>
          </div>
          <ol id="session-log" class="session-log"></ol>
        </section>
      </aside>

      <section class="workspace">
        <section class="terminal-pane">
          <div class="pane-header">
            <span id="terminal-title">not connected</span>
            <code id="cwd">.</code>
          </div>
          <div id="terminal"></div>
        </section>

        <section class="files-pane">
          <div class="pane-header files-header">
            <div class="files-header-row">
              <span>Remote files</span>
              <div class="sort-controls">
                <label for="file-sort">Sort</label>
                <select id="file-sort" title="Sort remote files">
                  <option value="name">Name</option>
                  <option value="size">Size</option>
                  <option value="date">Date</option>
                </select>
                <button id="sort-direction" type="button" title="Sort ascending" aria-label="Sort ascending">↑</button>
              </div>
            </div>
            <div class="file-pane-actions">
              <label class="follow-pwd-toggle" title="Keep the file tree synchronized with terminal pwd">
                <input id="follow-pwd" type="checkbox" checked />
                Tether to terminal
              </label>
            </div>
          </div>
          <ol id="file-tree" class="file-tree"></ol>
          <footer class="file-footer">
            <div id="file-summary" class="file-summary">0 files | 0 folders | Total 0 B</div>
            <div id="file-status" class="file-status" aria-live="polite">No file activity</div>
          </footer>
        </section>
      </section>
    </main>

    <script src="../../node_modules/@xterm/xterm/lib/xterm.js"></script>
    <script src="./renderer.js"></script>
  </body>
</html>
