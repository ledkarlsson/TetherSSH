<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TetherSSH</title>
    <link rel="stylesheet" href="../../node_modules/@xterm/xterm/css/xterm.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="connection-panel">
        <button
          id="toggle-connection-panel"
          class="connection-panel-toggle"
          type="button"
          aria-expanded="true"
          title="Toggle connection panel"
        >
          TetherSSH
        </button>

        <header>
          <h1>TetherSSH</h1>
          <p>Terminal and remote files, tied to one SSH session.</p>
        </header>

        <form id="connection-form" class="connection-form">
          <label>
            Connection
            <input id="target" name="target" autocomplete="off" required placeholder="user@hostname:22" />
          </label>

          <div id="tcp-status" class="tcp-status tcp-status-idle">Enter user@hostname:port</div>

          <label>
            Password <span class="label-hint">optional</span>
            <input id="password" name="password" type="password" autocomplete="current-password" />
          </label>

          <button id="connect-button" type="submit">Connect</button>
          <button id="disconnect-button" type="button" disabled>Disconnect</button>
        </form>

        <div id="status" class="status">Disconnected</div>
        <section class="session-log-panel">
          <div class="session-log-title">
            <span>Session log</span>
            <button id="toggle-session-log" type="button" aria-expanded="true">Hide</button>
          </div>
          <ol id="session-log" class="session-log"></ol>
        </section>
      </aside>

      <section class="workspace">
        <section class="terminal-pane">
          <div class="pane-header">
            <span id="terminal-title">not connected</span>
            <code id="cwd">.</code>
          </div>
          <div id="terminal"></div>
        </section>

        <section class="files-pane">
          <div class="pane-header">
            <span>Remote files</span>
            <div class="file-pane-actions">
              <label class="follow-pwd-toggle" title="Keep the file tree synchronized with terminal pwd">
                <input id="follow-pwd" type="checkbox" checked />
                Tether to terminal
              </label>
            </div>
          </div>
          <ol id="file-tree" class="file-tree"></ol>
        </section>
      </section>
    </main>

    <script src="../../node_modules/@xterm/xterm/lib/xterm.js"></script>
    <script src="./renderer.js"></script>
  </body>
</html>
